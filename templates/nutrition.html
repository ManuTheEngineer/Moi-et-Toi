        <div class="ctn">
          <!-- Hydration -->
          <div class="nh-section-label">Hydration</div>
          <div class="nh-hydration-card">
            <div class="nh-water-drops" id="hydration-track">
              <button class="nh-water-drop" onclick="logWater(1)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
              <button class="nh-water-drop" onclick="logWater(2)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
              <button class="nh-water-drop" onclick="logWater(3)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
              <button class="nh-water-drop" onclick="logWater(4)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
              <button class="nh-water-drop" onclick="logWater(5)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
              <button class="nh-water-drop" onclick="logWater(6)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
              <button class="nh-water-drop" onclick="logWater(7)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
              <button class="nh-water-drop" onclick="logWater(8)">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" /></svg>
              </button>
            </div>
            <div class="nh-water-label"><span id="water-count">0</span> / 8 glasses</div>
            <div class="t-xs c-t3 mt-8" id="nutr-partner-water"></div>
          </div>

          <!-- Meal Planning -->
          <div class="nh-section-label">What should we eat?</div>
          <div class="card mb-12">
            <div class="t-body c-cream mb-8">Plan meals together so you both eat well</div>
            <div class="d-flex gap-8 mb-10">
              <input type="text" id="meal-plan-input" placeholder="Meal idea for today..." class="flex-1" />
              <select id="meal-plan-slot" class="select-field" style="width: auto">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner" selected>Dinner</option>
              </select>
            </div>
            <button class="dq-submit" onclick="addMealPlan()">Add</button>
            <div id="meal-plan-list" class="mt-12"></div>
          </div>

          <!-- Shared Grocery List -->
          <div class="nh-section-label">Grocery List</div>
          <div class="nh-grocery-form">
            <input
              type="text"
              id="grocery-input"
              class="nh-meal-input"
              placeholder="Add item..."
              onkeydown="if (event.key === 'Enter') addGroceryItem();"
              style="flex: 1"
            />
            <button class="nh-meal-add-btn" onclick="addGroceryItem()">+</button>
          </div>
          <div id="grocery-list"><div class="empty">Build your shared grocery list</div></div>

          <!-- Recipes -->
          <div class="nh-section-label">Our Recipes</div>
          <div class="nh-plan-card">
            <input type="text" id="recipe-name" placeholder="Recipe name" class="nh-meal-input mb-8" />
            <textarea
              id="recipe-desc"
              placeholder="Ingredients &amp; instructions..."
              class="nh-recipe-textarea mb-8"
            ></textarea>
            <button class="nh-action-btn" onclick="saveRecipe()">Save Recipe</button>
          </div>
          <div id="recipe-list"><div class="empty">Save your favorite recipes</div></div>
        </div>
